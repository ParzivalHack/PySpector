[[rule]]
id = "G130"
description = "Hardcoded Cloudflare API token or Origin CA key detected."
severity = "Critical"
confidence = "High"
remediation = "Rotate at Cloudflare dashboard > My Profile > API Tokens. Load from env or a vault."
# Cloudflare Origin CA Key (very distinctive shape):
#   v1.0-<32 hex>-<146 hex>
# Cloudflare API Tokens are 40 chars [A-Za-z0-9_-]; matched only when paired with
# a "cloudflare" keyword on the same line to keep precision high.
pattern = "\\bv1\\.0-[a-f0-9]{32}-[a-f0-9]{146}\\b|(?i)cloudflare[^\\n]{0,40}[\"'][A-Za-z0-9_\\-]{40}[\"']"
exclude_pattern = "__SHARED_PLACEHOLDERS__"
