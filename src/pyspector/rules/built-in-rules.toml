confidence = "High"
remediation = "Revoke at https://cloud.digitalocean.com/account/api/tokens. Load from env or use a vault."
# DigitalOcean PAT formats:
#   dop_v1_<64 hex>  Personal Access Token
#   doo_v1_<64 hex>  OAuth token
