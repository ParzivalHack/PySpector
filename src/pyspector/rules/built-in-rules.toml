remediation = "Revoke at https://dashboard.doppler.com/workplace/tokens or via the affected service's settings."
# Doppler token formats:
#   dp.pt.<43+ chars>   Personal token
#   dp.st.<environment>.<43+ chars>  Service token
#   dp.ct.<43+ chars>   CLI token
#   dp.scim.<43+ chars> SCIM token
#   dp.audit.<43+ chars> Audit log token
#   dp.prov.<43+ chars> Provisioning token
pattern = "\\bdp\\.(pt|st|ct|scim|audit|prov|sa)\\.[A-Za-z0-9_\\-]{30,}\\b"
