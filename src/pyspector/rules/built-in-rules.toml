# Only flag when a capturing/non-capturing group itself has a quantifier INSIDE and OUTSIDE:
# (a+)+  (a*)*  (a+)*  (a+){2,} → dangerous nested quantifiers
# (\s+){key_name} → f-string brace after ), safe (brace not followed by digit)
