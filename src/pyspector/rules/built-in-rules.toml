[[rule]]
id = "G121"
description = "Database connection string contains embedded password."
severity = "Critical"
confidence = "High"
remediation = "Use environment variables for credentials or a connection-string library that pulls from a vault."
pattern = "(?i)\\b(postgres(?:ql)?|mysql|mongodb(?:\\+srv)?|mariadb|redis|rediss|amqp|amqps|mssql|oracle)://[^\\s:@\"'/]+:[^@\\s\"']{4,}@"
# Exclude when the connection string is not a literal credential:
#   - explicit placeholder words in the password portion (password, secret, changeme, …)
#   - Python f-string interpolation in user or password: {var}, {self.x}, {obj.attr}
#   - shell/env interpolation: ${VAR}, $(VAR), $VAR
#   - angle-bracket placeholders: <USER>, <PASSWORD>
#   - Jinja2 / Helm / cookiecutter templates: {{ var }}, {{var}}, {%…%}
#   - Lines that build a regex over a URL: re.match/compile/search with a connection-string-shaped pattern
#     (the f"…" detection misses regex strings because they use \1, capture groups, etc.)
exclude_pattern = "(?i)://[^:]+:(password|passwd|pass|secret|changeme|change[_\\-]me|placeholder|example|\\{\\{?[^}]+\\}\\}?|\\$\\{[^}]+\\}|\\$\\([^)]+\\)|\\$[A-Za-z_][A-Za-z0-9_]*|%\\([^)]+\\)s|<[^>]+>)@|://\\{\\{?[^}]+\\}\\}?:|^[^#]*\\bre\\.(match|compile|search|fullmatch)\\s*\\(|://[^:]+:[^@]+@(localhost|127\\.0\\.0\\.1|0\\.0\\.0\\.0|::1|host\\.docker\\.internal|db|database|postgres(ql)?|mysql|mariadb|mongo(db)?|redis|rabbitmq|broker|kafka|memcached|amqp)[:/?#\"' \\t]"
# Skip docs, env templates, and infrastructure templates (Helm, Jinja, cookiecutter).
exclude_file_pattern = "*.md,*.rst,*.html,*.txt,*.adoc,*.tex,*.env.example,*.env.template,*.env.sample,*.env.dist,env.example,*.tpl,*.j2,*.jinja,*.template,*cookiecutter*"
cwe = "CWE-798"

[[rule]]
id = "G121L"
description = "Dev-default database connection string detected (localhost/container-name host with embedded credentials)."
severity = "Low"
confidence = "Low"
remediation = "If this connection string ships to production, move credentials to env. For local-only dev defaults, this is informational — confirm the host is never reachable from prod."
# Same connection-string shape as G121, but restricted to hostnames that strongly
# suggest a local dev or docker-compose service: localhost, 127.0.0.1, ::1,
# host.docker.internal, and common service names (db, postgres, mysql, mongo,
# redis, rabbitmq, broker, kafka, memcached, amqp). These are still TPs
# (literal hardcoded credentials) but at much lower priority — they're the
# dominant FP class for the high-confidence G121 rule.
pattern = "(?i)\\b(postgres(?:ql)?|mysql|mongodb(?:\\+srv)?|mariadb|redis|rediss|amqp|amqps|mssql|oracle)://[^\\s:@\"'/]+:[^@\\s\"']{4,}@(localhost|127\\.0\\.0\\.1|0\\.0\\.0\\.0|::1|host\\.docker\\.internal|db|database|postgres(ql)?|mysql|mariadb|mongo(db)?|redis|rabbitmq|broker|kafka|memcached|amqp)[:/?#\"' \\t]"
exclude_pattern = "(?i)://[^:]+:(\\{\\{?[^}]+\\}\\}?|\\$\\{[^}]+\\}|\\$\\([^)]+\\)|\\$[A-Za-z_][A-Za-z0-9_]*|%\\([^)]+\\)s|<[^>]+>)@|://\\{\\{?[^}]+\\}\\}?:|^[^#]*\\bre\\.(match|compile|search|fullmatch)\\s*\\("
exclude_file_pattern = "*.md,*.rst,*.html,*.txt,*.adoc,*.tex,*.env.example,*.env.template,*.env.sample,*.env.dist,env.example,*.tpl,*.j2,*.jinja,*.template,*cookiecutter*"
cwe = "CWE-798"

[[rule]]
id = "G122"
description = "Hardcoded JWT in source code (eyJ… three-part token)."
severity = "High"
confidence = "Medium"
remediation = "JWTs in source typically grant access to a real account — rotate the issuer's signing key."
pattern = "\\beyJ[A-Za-z0-9_\\-]{10,}\\.eyJ[A-Za-z0-9_\\-]{10,}\\.[A-Za-z0-9_\\-]{10,}\\b"
exclude_pattern = "(?i)example|sample|placeholder|change[_\\-]?me"
# No file_pattern restriction — JWTs appear in *.py, *.js, *.yaml, *.json, *.sh,
# build configs, and many other source/config files. Doc-extension exclude still applies.
exclude_file_pattern = "*.md,*.rst,*.html,*.txt,*.adoc,*.tex,*.log,*.lock"
cwe = "CWE-798"

[[rule]]
id = "G123"
description = "Basic-auth credentials embedded in URL (https://user:pass@…)."
severity = "High"
confidence = "Medium"
remediation = "Never inline credentials in URLs — they leak via logs, Referer headers, and process listings."
# Basic-auth password component cannot contain "/" (it ends the userinfo segment),
# so requiring [^@\s"'/]{4,} between ":" and "@" eliminates the JS-stack-trace FP
# class like "http://localhost:5173/node_modules/.vite/deps/@react.js?…:759:3) @ http://…"
# where "5173/node_modules/.vite/deps/" was being parsed as the password.
pattern = "https?://[^:/\\s\"']+:[^@\\s\"'/]{4,}@[^\\s\"']+"
# Exclusions:
#   - placeholders / env interpolation / template markers (same families as G121)
#   - well-known schemes that put a literal in the user position: oauth2:, x-access-token:, token:
exclude_pattern = "(?i)://[A-Za-z0-9._\\-]+:(pass(word)?|secret|changeme|change[_\\-]me|placeholder|example|\\{\\{?[^}]+\\}\\}?|\\$\\{[^}]+\\}|\\$\\([^)]+\\)|\\$[A-Za-z_][A-Za-z0-9_]*|%\\([^)]+\\)s|<[^>]+>)@|://(oauth2|x-access-token|token):"
# Skip docs, env templates, and log files (JS stack traces contain http://host:port/path@module FPs).
exclude_file_pattern = "*.md,*.rst,*.html,*.txt,*.adoc,*.tex,*.log,*.env.example,*.env.template,*.env.sample,*.env.dist,env.example,*.tpl,*.j2,*.jinja,*.template,*cookiecutter*"
cwe = "CWE-798"

