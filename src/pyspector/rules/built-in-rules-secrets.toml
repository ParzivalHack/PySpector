# PySpector Secret Detection Rules
#
# All `[[rule]]` entries here set `redact = true`: the matched secret value
# (its first capture group, if the pattern has one) is masked to first/last 4
# characters before it is ever stored on an `Issue`, so raw secret material
# never reaches a report, log, or terminal. `redact = true` also makes the
# rule bypass the Python comment/string-literal heuristic in
# `config_analysis::is_in_comment_or_string`, since secrets routinely live
# inside string literals (.env/.json/.yaml values).

# -------------------------------------------
# SECTION: Cloud provider credentials
# -------------------------------------------

[[rule]]
id = "SEC-AWS-001"
description = "Hardcoded AWS Access Key ID."
severity = "Critical"
confidence = "High"
remediation = "Revoke this key in the AWS IAM console and load credentials from environment variables, an IAM role, or a secrets manager instead."
pattern = '(AKIA[0-9A-Z]{16})'
redact = true

[[rule]]
id = "SEC-AWS-002"
description = "Hardcoded AWS Secret Access Key."
severity = "Critical"
confidence = "Medium"
remediation = "Revoke this key in the AWS IAM console and load credentials from environment variables, an IAM role, or a secrets manager instead."
pattern = "(?i)aws_secret_access_key\\s*[:=]\\s*['\"]?([A-Za-z0-9/+=]{40})['\"]?"
redact = true

[[rule]]
id = "SEC-GCP-001"
description = "GCP service account key file detected."
severity = "High"
confidence = "Medium"
remediation = "Do not commit service account key files. Use Workload Identity Federation or a secrets manager instead."
pattern = '"type"\s*:\s*"service_account"'
file_pattern = "*.json"
# No secret value is captured here (just a marker string), but `redact = true`
# is needed anyway so this rule bypasses the Python comment/string-literal
# heuristic: the whole line is a quoted JSON string and would otherwise be
# skipped as a "string literal".
redact = true

[[rule]]
id = "SEC-GCP-002"
description = "Hardcoded GCP service account private key."
severity = "Critical"
confidence = "High"
remediation = "Revoke this key in the GCP IAM console and remove it from source control. Use Workload Identity Federation or a secrets manager instead."
pattern = '"private_key"\s*:\s*"(-----BEGIN [^"]+?-----[^"]*)"'
file_pattern = "*.json"
redact = true

[[rule]]
id = "SEC-AZURE-001"
description = "Hardcoded Azure Storage connection string."
severity = "Critical"
confidence = "High"
remediation = "Rotate the storage account key in the Azure Portal and load connection strings from a secrets manager (e.g. Azure Key Vault) instead."
pattern = 'DefaultEndpointsProtocol=https?;AccountName=[^;]+;AccountKey=([A-Za-z0-9+/=]{20,})'
redact = true

# -------------------------------------------
# SECTION: SaaS / developer platform tokens
# -------------------------------------------

[[rule]]
id = "SEC-GITHUB-001"
description = "Hardcoded GitHub Personal Access Token or OAuth token."
severity = "Critical"
confidence = "High"
remediation = "Revoke this token at https://github.com/settings/tokens and use a secrets manager or CI secret store instead."
pattern = '(gh[pousr]_[A-Za-z0-9]{36,255})'
redact = true

[[rule]]
id = "SEC-SLACK-001"
description = "Hardcoded Slack token."
severity = "High"
confidence = "High"
remediation = "Revoke this token in your Slack App configuration and load it from a secrets manager instead."
pattern = '(xox[baprs]-[0-9A-Za-z-]{10,72})'
redact = true

[[rule]]
id = "SEC-STRIPE-001"
description = "Hardcoded Stripe live API key."
severity = "Critical"
confidence = "High"
remediation = "Revoke this key in the Stripe Dashboard and load it from a secrets manager instead."
pattern = '((?:sk|pk|rk)_live_[0-9a-zA-Z]{24,})'
redact = true

# -------------------------------------------
# SECTION: Private key material
# -------------------------------------------

[[rule]]
id = "SEC-PRIVATEKEY-001"
description = "Private key material (RSA/EC/OpenSSH/DSA/PGP) committed to the repository."
severity = "Critical"
confidence = "High"
remediation = "Remove the private key from source control, rotate the corresponding keypair, and store private keys outside the repository (e.g. a secrets manager or local keychain)."
pattern = '-----BEGIN ((RSA|EC|OPENSSH|DSA|PGP) )?PRIVATE KEY-----'
# redact = true for defense-in-depth (bypasses the comment/string heuristic)
# even though this marker alone reveals only the key type, not key material.
redact = true

[[rule]]
id = "SEC-JWT-001"
description = "Hardcoded JSON Web Token (JWT)."
severity = "High"
confidence = "Medium"
remediation = "JWTs can carry sensitive claims and may be replayable until expiry. Remove hardcoded tokens and issue them at runtime instead."
pattern = '(eyJ[A-Za-z0-9_-]{5,}\.eyJ[A-Za-z0-9_-]{5,}\.[A-Za-z0-9_-]{10,})'
redact = true

# -------------------------------------------
# SECTION: Generic secret assignment
# -------------------------------------------

[[rule]]
id = "SEC-GENERIC-001"
description = "Generic hardcoded secret (api_key/secret/password/token assignment)."
severity = "Medium"
confidence = "Low"
remediation = "Load this value from an environment variable or secrets manager instead of hardcoding it."
pattern = "(?i)(?:api[_-]?key|secret|password|passwd|token)\\s*[:=]\\s*['\"]([A-Za-z0-9_./+=-]{8,})['\"]"
redact = true

# -------------------------------------------
# SECTION: High-entropy generic secrets
# -------------------------------------------

[[entropy_rule]]
id = "SEC-ENTROPY-001"
description = "High-entropy string that may be an undetected secret (base64/hex blob)."
severity = "Medium"
confidence = "Low"
remediation = "Review this value. If it is a credential or key, move it to a secrets manager or environment variable; if it is not sensitive, add it to the baseline."
token_pattern = "[A-Za-z0-9+/_=-]{20,}"
min_length = 20
threshold = 4.5
